<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplikasi Absensi Digital Yayasan Al-Mumtaz">
    <title>Absensi Al-Mumtaz</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>

<body>
    <div id="app"></div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <!-- Fullscreen absen flow -->
    <div class="absen-flow" id="absenFlow">
        <div class="absen-flow-header">
            <button class="modal-close" id="absenFlowClose" aria-label="Tutup">✕</button>
            <h3 id="absenFlowTitle">Absen Masuk</h3>
        </div>
        <div class="absen-flow-body" id="absenFlowBody"></div>
    </div>

    <!-- Generic modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent"></div>
    </div>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/geofence.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/pages/employee.js"></script>
    <script src="js/pages/unit-head.js"></script>
    <script src="js/pages/admin.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
